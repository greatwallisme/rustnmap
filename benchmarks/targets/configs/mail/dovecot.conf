# Dovecot configuration for RustNmap test range
# POP3 + IMAP with STARTTLS support

protocols = imap pop3

listen = *

# SSL
ssl = required
ssl_cert = </etc/dovecot/ssl/dovecot.crt
ssl_key = </etc/dovecot/ssl/dovecot.key

# Plaintext auth allowed for testing
disable_plaintext_auth = no
auth_mechanisms = plain login

# Passdb
passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

userdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

# Mail location
mail_location = mbox:~/Mail:INBOX=/var/mail/%u

# POP3
protocol pop3 {
  pop3_uidl_format = %08Xu%08Xv
  mail_max_userip_connections = 50
}

# IMAP
protocol imap {
  mail_max_userip_connections = 50
}

# Logging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log

# Login greeting
login_greeting = RustNmap Dovecot ready.

# Service configurations
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}
