# SNMP configuration for RustNmap test range
# Community strings
rocommunity public
rwcommunity private

# System information
sysDescr RustNmap SNMP Test Agent
sysContact admin@rustnmap.test
sysLocation RustNmap Test Lab
sysName rustnmap-snmp

# Full MIB tree access
view all included .1 80
access notConfigGroup "" any noauth exact all none none

# Allow all OIDs
rocommunity public default -V all
rwcommunity private default -V all

# Disk monitoring
disk / 10000

# Load average
load 12 10 5

# Process monitoring
proc sshd
proc nginx

# Network interface information
interface eth0 6 10000000

# Trap destinations
trapsink localhost public

# Engine ID
engineIDType 1
engineIDNit rustnmap-snmp-01

# Master agent
master agentx

# Allow all connections
agentAddress udp:161,udp6:161,tcp:161

# Logging
logOption f /var/log/snmpd.log
