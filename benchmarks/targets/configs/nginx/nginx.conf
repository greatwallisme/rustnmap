worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name web.rustnmap.test rustnmap-web localhost;
        server_tokens on;

        root /usr/share/nginx/html;
        index index.html;

        # Custom headers for http-headers testing
        add_header X-Powered-By "RustNmap-Test" always;
        add_header X-Frame-Options "DENY" always;

        # CORS headers for http-cors testing
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

        # Cookie for http-cookie-flags testing (intentionally missing HttpOnly/Secure)
        add_header Set-Cookie "sessionid=abc123; path=/" always;

        location / {
            try_files $uri $uri/ =404;
        }

        # Login form for http-default-accounts testing
        location /login.html {
            try_files $uri =404;
        }

        # robots.txt for http-robots.txt testing
        location = /robots.txt {
            alias /usr/share/nginx/html/robots.txt;
        }

        # Git directory for http-git testing
        location /.git/ {
            alias /usr/share/nginx/html/.git/;
            autoindex on;
        }

        # Admin directory for http-default-accounts testing
        # Both /admin and /admin/ must return 401 directly (no redirect)
        location = /admin {
            auth_basic "ActiveMQRealm";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
        location /admin/ {
            auth_basic "ActiveMQRealm";
            auth_basic_user_file /etc/nginx/.htpasswd;
            alias /usr/share/nginx/html/admin/;
        }

        # Upload directory with WebDAV for http-methods testing
        location /upload/ {
            alias /usr/share/nginx/html/upload/;
            dav_methods PUT DELETE;
            dav_access user:rw group:rw all:r;
            create_full_put_path on;
        }

        # Config directory for http-enum testing
        location /config/ {
            alias /usr/share/nginx/html/config/;
            autoindex on;
        }

        # Backup directory for http-enum testing
        location /backup/ {
            alias /usr/share/nginx/html/backup/;
            autoindex on;
        }

        # phpMyAdmin path for http-enum testing
        location /phpmyadmin/ {
            return 403;
        }

        # Enable OPTIONS for http-methods and http-cors testing
        location ~ ^/upload(/|$) {
            if ($request_method = OPTIONS) {
                add_header Allow "GET, HEAD, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type" always;
                return 204;
            }
        }

        # CORS OPTIONS handler for root path
        location = / {
            if ($request_method = OPTIONS) {
                add_header Allow "GET, HEAD, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type" always;
                return 204;
            }
            try_files $uri $uri/ =404;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name web.rustnmap.test rustnmap-web localhost;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Powered-By "RustNmap-Test" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Alternate HTTPS port
    server {
        listen 8443 ssl;
        server_name web.rustnmap.test;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
