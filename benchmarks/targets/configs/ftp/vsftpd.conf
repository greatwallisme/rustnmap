# vsftpd configuration for RustNmap test range
anonymous_enable=YES
local_enable=YES
write_enable=YES
local_umask=022
anon_upload_enable=YES
anon_mkdir_write_enable=YES
dirmessage_enable=YES
xferlog_enable=YES
connect_from_port_20=YES
listen=YES
listen_port=21
background=NO

# Banner for version detection
ftpd_banner=RustNmap FTP Test Server

# PASV mode
pasv_enable=YES
pasv_min_port=50000
pasv_max_port=50100

# For FTP bounce scan testing (-b)
port_enable=YES
port_promiscuous=YES

# Welcome message
banner_file=/etc/vsftpd/welcome.txt

# Logging
log_ftp_protocol=YES
dual_log_enable=YES

# Security (intentionally relaxed for testing)
seccomp_sandbox=NO
ls_recurse_enable=YES
hide_ids=YES

# Max clients
max_clients=100
max_per_ip=10
