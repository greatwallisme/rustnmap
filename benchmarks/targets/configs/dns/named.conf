// BIND9 configuration for RustNmap test range
options {
    directory "/var/cache/bind";
    recursion yes;
    allow-recursion { any; };
    allow-query { any; };
    allow-query-cache { any; };
    forwarders { 8.8.8.8; 8.8.4.4; };
    dnssec-validation no;
    version "RustNmap BIND Test";
    server-id "rustnmap-dns-01";
    listen-on { any; };
    listen-on-v6 { none; };
};

zone "rustnmap.test" {
    type master;
    file "/var/lib/bind/db.rustnmap.test";
    allow-transfer { any; };
};

zone "0.28.172.in-addr.arpa" {
    type master;
    file "/var/lib/bind/db.172.28.0";
    allow-transfer { any; };
};
