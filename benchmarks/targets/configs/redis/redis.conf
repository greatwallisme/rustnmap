# Redis configuration for RustNmap test range
bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 60

# Logging
loglevel notice
logfile ""

# Databases
databases 16

# Persistence (minimal for testing)
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 64mb
maxmemory-policy allkeys-lru

# No authentication (for redis-info testing)
# requirepass not set
